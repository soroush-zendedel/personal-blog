{% extends "base.html" %}

{% block content %}
  <!-- بررسی می‌کند که آیا این فایل دارای دسته‌بندی در متادیتا هست یا خیر -->
  {% if page.meta and page.meta.category %}
    <div class="custom-post-header">
      <div class="custom-post-meta">
        <span class="custom-badge-category">
          <i class="fa-solid fa-tag"></i> {{ page.meta.category }}
        </span>
        <span class="custom-badge-date">
          <i class="fa-solid fa-calendar-days"></i> {{ page.meta.date }}
        </span>
        <!-- اگر متادیتای زمان مطالعه (مثلا read_time: "۵ دقیقه") هم داشتید می‌توانید اینجا اضافه کنید -->
      </div>
    </div>
  {% endif %}
  
  <!-- این دستور محتوای اصلی مارک‌داون شما را رندر می‌کند -->
  {{ super() }}
{% endblock %}

{% block footer %}
  {{ super() }}
  
  <!-- دکمه شناور بازگشت به سایت اصلی -->
  <a href="https://soroush-zendedel.github.io/" class="floating-back-btn" title="بازگشت به سایت اصلی (سروش زنده‌دل)">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M12 5.69l5 4.5V18h-2v-6H9v6H7v-7.81l5-4.5M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/>
    </svg>
  </a>
{% endblock %}
